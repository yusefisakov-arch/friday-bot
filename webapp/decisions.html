<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Договорённость</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #000000);
  }
  h2 { margin: 0 0 16px; font-size: 18px; }
  .field { margin-bottom: 20px; }
  label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--tg-theme-hint-color, #999999);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  textarea, input[type="text"], input[type="date"] {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--tg-theme-hint-color, #cccccc);
    background: var(--tg-theme-secondary-bg-color, #f0f0f0);
    color: var(--tg-theme-text-color, #000000);
    font-size: 16px;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 70px; }
  .options { display: flex; flex-wrap: wrap; gap: 8px; }
  .options button {
    padding: 8px 14px;
    border-radius: 18px;
    border: 1px solid var(--tg-theme-hint-color, #cccccc);
    background: transparent;
    color: var(--tg-theme-text-color, #000000);
    font-size: 14px;
    cursor: pointer;
  }
  .options button.selected {
    background: var(--tg-theme-button-color, #2481cc);
    color: var(--tg-theme-button-text-color, #ffffff);
    border-color: var(--tg-theme-button-color, #2481cc);
  }
  .hidden { display: none; margin-top: 8px; }
</style>
</head>
<body>
  <h2>Новая договорённость</h2>

  <div class="field">
    <label>С кем</label>
    <div class="options" id="with-whom-options" data-field="with_whom">
      <button type="button" data-value="custom" class="selected">Другое</button>
    </div>
    <input type="text" id="with-whom-custom" placeholder="Имя">
  </div>

  <div class="field">
    <label>О чём договорились</label>
    <textarea id="what-decided" placeholder="Что именно решили"></textarea>
  </div>

  <div class="field">
    <label>Дедлайн</label>
    <div class="options" data-field="deadline">
      <button type="button" data-value="today">Сегодня</button>
      <button type="button" data-value="tomorrow">Завтра</button>
      <button type="button" data-value="custom">Своя дата</button>
      <button type="button" data-value="" class="selected">Нет</button>
    </div>
    <input type="date" id="deadline-custom" class="hidden">
  </div>

  <div class="field">
    <label>Следующий шаг</label>
    <input type="text" id="next-step" placeholder="Необязательно">
  </div>

  <script>
    var tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    var selected = { with_whom: "custom", deadline: "" };

    var whGroup = document.getElementById("with-whom-options");
    fetch("/api/staff", { headers: { "X-Telegram-Init-Data": tg.initData } }).then(function (r) { return r.json(); }).then(function (staff) {
      staff.slice().reverse().forEach(function (name) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.dataset.value = name;
        btn.textContent = name;
        whGroup.insertBefore(btn, whGroup.firstChild);
      });
    }).catch(function () {});

    document.querySelectorAll(".options").forEach(function (group) {
      var field = group.dataset.field;
      group.addEventListener("click", function (e) {
        var btn = e.target.closest("button");
        if (!btn) return;
        group.querySelectorAll("button").forEach(function (b) { b.classList.remove("selected"); });
        btn.classList.add("selected");
        selected[field] = btn.dataset.value;

        if (field === "with_whom") {
          var customInput = document.getElementById("with-whom-custom");
          customInput.classList.toggle("hidden", btn.dataset.value !== "custom");
          if (btn.dataset.value !== "custom") {
            customInput.value = btn.dataset.value;
          } else {
            customInput.value = "";
          }
        }

        if (field === "deadline") {
          var dateInput = document.getElementById("deadline-custom");
          dateInput.classList.toggle("hidden", btn.dataset.value !== "custom");
        }
      });
    });

    tg.MainButton.setText("Записать");
    tg.MainButton.show();
    tg.MainButton.onClick(function () {
      var withWhom = document.getElementById("with-whom-custom").value.trim();
      if (!withWhom) {
        tg.showAlert("Укажите, с кем договорились, сэр.");
        return;
      }

      var whatDecided = document.getElementById("what-decided").value.trim();
      if (!whatDecided) {
        tg.showAlert("Опишите, о чём договорились, сэр.");
        return;
      }

      var deadline = selected.deadline;
      if (deadline === "custom") {
        deadline = document.getElementById("deadline-custom").value;
        if (!deadline) {
          tg.showAlert("Укажите дату или выберите другой вариант.");
          return;
        }
      }

      tg.sendData(JSON.stringify({
        form: "decision",
        with_whom: withWhom,
        what_decided: whatDecided,
        deadline: deadline,
        next_step: document.getElementById("next-step").value.trim()
      }));
    });
  </script>
</body>
</html>
