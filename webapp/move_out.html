<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Выселение</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #000000);
  }
  h2 { margin: 0 0 16px; font-size: 18px; }
  h3 { margin: 24px 0 8px; font-size: 14px; color: var(--tg-theme-hint-color, #999999); text-transform: uppercase; letter-spacing: 0.03em; }
  .field { margin-bottom: 20px; }
  label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--tg-theme-hint-color, #999999);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  input[type="text"], input[type="number"], input[type="date"], select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--tg-theme-hint-color, #cccccc);
    background: var(--tg-theme-secondary-bg-color, #f0f0f0);
    color: var(--tg-theme-text-color, #000000);
    font-size: 16px;
    font-family: inherit;
  }
</style>
</head>
<body>
  <h2>Выселение</h2>

  <div class="field">
    <label>Квартира</label>
    <select id="apartment-select">
      <option value="">Выберите квартиру</option>
    </select>
  </div>

  <div class="field">
    <label>Дата выезда</label>
    <input type="date" id="move-out-date">
  </div>

  <h3>Показания счётчиков на момент выезда</h3>
  <div id="meters"></div>

  <h3>Депозит</h3>
  <div class="field">
    <label>Возврат депозита</label>
    <input type="number" id="deposit-return" inputmode="decimal" placeholder="0">
  </div>

  <div class="field">
    <label>Комментарий (если удержали часть)</label>
    <input type="text" id="deposit-comment" placeholder="Необязательно">
  </div>

  <script>
    var tg = window.Telegram.WebApp;
    var WAKEY = new URLSearchParams(location.search).get("k") || "";
    tg.ready();
    tg.expand();

    var UNITS = {
      "свет": "кВт·ч",
      "газ": "м³",
      "вода": "м³",
      "горячая вода": "м³",
      "отопление": "м³"
    };

    var metersContainer = document.getElementById("meters");
    Object.keys(UNITS).forEach(function (utilityType) {
      var field = document.createElement("div");
      field.className = "field";
      var label = document.createElement("label");
      label.textContent = utilityType + " (" + UNITS[utilityType] + ")";
      var input = document.createElement("input");
      input.type = "number";
      input.inputMode = "decimal";
      input.placeholder = "0";
      input.dataset.utility = utilityType;
      field.appendChild(label);
      field.appendChild(input);
      metersContainer.appendChild(field);
    });

    var apartmentSelect = document.getElementById("apartment-select");
    fetch("/api/apartments", { headers: { "X-Webapp-Key": WAKEY } }).then(function (r) { return r.json(); }).then(function (apartments) {
      apartments.forEach(function (address) {
        var opt = document.createElement("option");
        opt.value = address;
        opt.textContent = address;
        apartmentSelect.appendChild(opt);
      });
    }).catch(function () {});

    tg.MainButton.setText("Сохранить выселение");
    tg.MainButton.show();
    tg.MainButton.onClick(function () {
      if (!apartmentSelect.value) {
        tg.showAlert("Выберите квартиру, сэр.");
        return;
      }

      var meters = {};
      metersContainer.querySelectorAll("input").forEach(function (input) {
        if (input.value !== "") {
          meters[input.dataset.utility] = input.value;
        }
      });

      tg.sendData(JSON.stringify({
        form: "move_out",
        apartment: apartmentSelect.value,
        move_out_date: document.getElementById("move-out-date").value,
        meters: meters,
        deposit_return: document.getElementById("deposit-return").value,
        deposit_comment: document.getElementById("deposit-comment").value.trim()
      }));
    });
  </script>
</body>
</html>
