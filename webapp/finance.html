<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Финансы</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--tg-theme-bg-color, #ffffff);
    color: var(--tg-theme-text-color, #000000);
  }
  h2 { margin: 0 0 16px; font-size: 18px; }
  .field { margin-bottom: 20px; }
  label {
    display: block;
    margin-bottom: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--tg-theme-hint-color, #999999);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }
  textarea, input[type="text"], input[type="number"] {
    width: 100%;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--tg-theme-hint-color, #cccccc);
    background: var(--tg-theme-secondary-bg-color, #f0f0f0);
    color: var(--tg-theme-text-color, #000000);
    font-size: 16px;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 70px; }
  .options { display: flex; flex-wrap: wrap; gap: 8px; }
  .options button {
    padding: 8px 14px;
    border-radius: 18px;
    border: 1px solid var(--tg-theme-hint-color, #cccccc);
    background: transparent;
    color: var(--tg-theme-text-color, #000000);
    font-size: 14px;
    cursor: pointer;
  }
  .options button.selected {
    background: var(--tg-theme-button-color, #2481cc);
    color: var(--tg-theme-button-text-color, #ffffff);
    border-color: var(--tg-theme-button-color, #2481cc);
  }
  .hidden { display: none; margin-top: 8px; }
</style>
</head>
<body>
  <h2>Финансы</h2>

  <div class="field">
    <label>Тип</label>
    <div class="options" data-field="type">
      <button type="button" data-value="расход" class="selected">Расход</button>
      <button type="button" data-value="доход">Доход</button>
    </div>
  </div>

  <div class="field">
    <label>Сумма</label>
    <input type="number" id="amount" inputmode="decimal" placeholder="0">
  </div>

  <div class="field">
    <label>Категория</label>
    <div class="options" data-field="category">
      <button type="button" data-value="Еда">Еда</button>
      <button type="button" data-value="Транспорт">Транспорт</button>
      <button type="button" data-value="ЖКХ">ЖКХ</button>
      <button type="button" data-value="Зарплата">Зарплата</button>
      <button type="button" data-value="Прочее">Прочее</button>
      <button type="button" data-value="custom" class="selected">Свой вариант</button>
    </div>
    <input type="text" id="category-custom" placeholder="Категория">
  </div>

  <div class="field">
    <label>Комментарий</label>
    <textarea id="comment" placeholder="Необязательно"></textarea>
  </div>

  <script>
    var tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    var selected = { type: "расход", category: "custom" };

    document.querySelectorAll(".options").forEach(function (group) {
      var field = group.dataset.field;
      group.addEventListener("click", function (e) {
        var btn = e.target.closest("button");
        if (!btn) return;
        group.querySelectorAll("button").forEach(function (b) { b.classList.remove("selected"); });
        btn.classList.add("selected");
        selected[field] = btn.dataset.value;

        if (field === "category") {
          var customInput = document.getElementById("category-custom");
          customInput.classList.toggle("hidden", btn.dataset.value !== "custom");
          if (btn.dataset.value !== "custom") {
            customInput.value = btn.dataset.value;
          } else {
            customInput.value = "";
          }
        }
      });
    });

    tg.MainButton.setText("Записать");
    tg.MainButton.show();
    tg.MainButton.onClick(function () {
      var amount = parseFloat(document.getElementById("amount").value);
      if (!amount || amount <= 0) {
        tg.showAlert("Укажите сумму, сэр.");
        return;
      }

      var category = document.getElementById("category-custom").value.trim();
      if (!category) {
        tg.showAlert("Укажите категорию, сэр.");
        return;
      }

      tg.sendData(JSON.stringify({
        form: "finance",
        amount: amount,
        category: category,
        type: selected.type,
        comment: document.getElementById("comment").value.trim()
      }));
    });
  </script>
</body>
</html>
