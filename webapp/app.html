<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1115">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>brain map</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overscroll-behavior: none; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f1115; color: #e8eaed; }
  .pad { padding: calc(env(safe-area-inset-top,0px) + 18px) 14px calc(env(safe-area-inset-bottom,0px) + 90px); }
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .logo { font-size: 22px; font-weight: 800; } .logo span { color: #7c5cff; }
  .back { color: #7c5cff; font-size: 16px; cursor: pointer; }
  .hint { text-align: center; color: #8b90a0; font-size: 14px; margin-top: 40px; line-height: 1.5; }

  .map-card { background: #1a1d27; border: 1px solid #262a38; border-radius: 14px; padding: 16px; margin-bottom: 10px;
              display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .map-card .t { font-size: 16px; font-weight: 700; } .map-card .s { font-size: 12px; color: #8b90a0; margin-top: 3px; }
  .map-card .more { font-size: 22px; color: #8b90a0; padding: 0 6px; }

  /* граф на весь экран */
  #graph { position: fixed; inset: 0; width: 100%; height: 100%; background:
           radial-gradient(circle at 50% 45%, #161922 0%, #0f1115 70%); touch-action: none; display: block; }
  .gnode { cursor: pointer; }
  .gnode text { pointer-events: none; }
  .map-top { position: fixed; top: 0; left: 0; right: 0; z-index: 5; display: flex; align-items: center; gap: 12px;
             padding: calc(env(safe-area-inset-top,0px) + 12px) 16px 12px; background: linear-gradient(#0f1115ee, #0f111500); }
  .fab { position: fixed; right: 18px; bottom: calc(env(safe-area-inset-bottom,0px) + 20px); background: #7c5cff; color: #fff;
         border: none; border-radius: 30px; padding: 14px 20px; font-size: 16px; font-weight: 700; box-shadow: 0 4px 16px #0008; cursor: pointer; z-index: 5; }
  .hintbar { position: fixed; left: 0; right: 0; bottom: calc(env(safe-area-inset-bottom,0px) + 20px); text-align: center;
             color: #5a6072; font-size: 11px; z-index: 4; pointer-events: none; }

  .modal-bg, .sheet-bg { position: fixed; inset: 0; background: #000a; display: none; z-index: 20; align-items: center; justify-content: center; }
  .modal-bg.show, .sheet-bg.show { display: flex; }
  .modal { background: #1a1d27; border-radius: 16px; padding: 18px; width: 88%; max-width: 420px; }
  .modal h3 { margin: 0 0 12px; font-size: 16px; }
  .modal input, .modal textarea { width: 100%; padding: 11px; border-radius: 10px; border: 1px solid #333; background: #0f1115; color: #e8eaed; font-size: 16px; font-family: inherit; }
  .modal textarea { min-height: 90px; }
  .modal-btns { display: flex; gap: 8px; margin-top: 14px; }
  .modal-btns button { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .b-ok { background: #7c5cff; color: #fff; } .b-cancel { background: #2a2f40; color: #e8eaed; }
  .sheet-bg { align-items: flex-end; }
  .sheet { background: #1a1d27; border-radius: 18px 18px 0 0; padding: 12px 14px calc(env(safe-area-inset-bottom,0px) + 16px); width: 100%; }
  .sheet h4 { margin: 6px 6px 12px; font-size: 14px; color: #aab0c0; }
  .sheet button { width: 100%; text-align: left; padding: 14px; background: none; border: none; color: #e8eaed; font-size: 16px; border-radius: 10px; cursor: pointer; }
  .sheet button.danger { color: #ff6b6b; }
</style>
</head>
<body>
  <div id="auth-needed" class="pad" style="display:none">
    <div class="hint">Вставьте ключ из бота (команда /app):</div>
    <div style="margin-top:14px; display:flex; gap:8px; max-width:420px; margin:14px auto 0;">
      <input id="key-input" placeholder="ключ или ссылка из бота" style="flex:1; padding:11px; border-radius:10px; border:1px solid #333; background:#1a1d27; color:#e8eaed; font-size:15px;">
      <button id="key-save" style="padding:11px 16px; border:none; border-radius:10px; background:#7c5cff; color:#fff; font-weight:700;">Войти</button>
    </div>
  </div>

  <div id="maps-screen" class="pad" style="display:none">
    <div class="topbar"><div class="logo">🧠 brain<span>map</span></div></div>
    <div id="maps-list"></div>
    <button class="fab" id="new-map">+ Новая карта</button>
  </div>

  <div id="map-screen" style="display:none">
    <svg id="graph"><g id="gview"></g></svg>
    <div class="map-top"><span class="back" id="map-back">‹ Карты</span><span id="map-name" style="font-weight:700"></span></div>
    <div class="hintbar">тяни — двигать · щипок — зум · тап по узлу — действия</div>
    <button class="fab" id="add-block">+ блок</button>
  </div>

  <div class="modal-bg" id="modal-bg"><div class="modal"><h3 id="modal-title"></h3><div id="modal-field"></div>
    <div class="modal-btns"><button class="b-cancel" id="modal-cancel">Отмена</button><button class="b-ok" id="modal-ok">ОК</button></div></div></div>
  <div class="sheet-bg" id="sheet-bg"><div class="sheet" id="sheet"></div></div>

<script>
  var SVGNS = "http://www.w3.org/2000/svg";
  var PALETTE = ["#7c5cff", "#22b8cf", "#ff922b", "#51cf66", "#ff6b6b", "#fcc419", "#cc5de8", "#20c997", "#ff8787", "#74c0fc"];

  // ---- auth ----
  function extractKey(s) { if (!s) return ""; var m = s.match(/[?#&]?k=([^&\s]+)/); return m ? decodeURIComponent(m[1]) : s.trim(); }
  (function () {
    var inc = new URLSearchParams(location.search).get("k");
    if (!inc) { var m = location.hash.match(/k=([^&]+)/); if (m) inc = decodeURIComponent(m[1]); }
    if (inc) { try { localStorage.setItem("fkey", inc); } catch (e) {} history.replaceState(null, "", "/app"); }
  })();
  var KEY = ""; try { KEY = localStorage.getItem("fkey") || ""; } catch (e) {}
  document.getElementById("key-save").onclick = function () { var k = extractKey(document.getElementById("key-input").value); if (!k) return; try { localStorage.setItem("fkey", k); } catch (e) {} location.href = "/app"; };

  function esc(s) { var p = document.createElement("span"); p.textContent = s || ""; return p.innerHTML; }
  function api(path, opts) { opts = opts || {}; opts.headers = Object.assign({ "X-Webapp-Key": KEY, "Content-Type": "application/json" }, opts.headers || {}); return fetch(path, opts).then(function (r) { return r.json(); }); }
  function post(path, body) { return api(path, { method: "POST", body: JSON.stringify(body) }); }

  // ---- modal & sheet ----
  function openInput(title, value, multiline, cb) {
    document.getElementById("modal-title").textContent = title;
    var f = document.getElementById("modal-field");
    f.innerHTML = multiline ? '<textarea id="modal-input"></textarea>' : '<input id="modal-input">';
    var inp = document.getElementById("modal-input"); inp.value = value || "";
    document.getElementById("modal-bg").classList.add("show"); setTimeout(function () { inp.focus(); }, 50);
    document.getElementById("modal-ok").onclick = function () { var v = inp.value.trim(); document.getElementById("modal-bg").classList.remove("show"); cb(v); };
  }
  document.getElementById("modal-cancel").onclick = function () { document.getElementById("modal-bg").classList.remove("show"); };
  document.getElementById("modal-bg").onclick = function (e) { if (e.target === this) this.classList.remove("show"); };
  function openSheet(title, actions) {
    var s = document.getElementById("sheet"); s.innerHTML = "<h4>" + esc(title) + "</h4>";
    actions.forEach(function (a) { var b = document.createElement("button"); b.textContent = a.label; if (a.danger) b.className = "danger"; b.onclick = function () { document.getElementById("sheet-bg").classList.remove("show"); a.fn(); }; s.appendChild(b); });
    document.getElementById("sheet-bg").classList.add("show");
  }
  document.getElementById("sheet-bg").onclick = function (e) { if (e.target === this) this.classList.remove("show"); };

  // ---- maps list ----
  function showMaps() {
    document.getElementById("map-screen").style.display = "none";
    document.getElementById("maps-screen").style.display = "block";
    api("/api/maps").then(function (list) {
      var box = document.getElementById("maps-list"); box.innerHTML = "";
      if (!list.length) box.innerHTML = '<div class="hint">Пока нет карт.<br>Создай первую — разложи проект на части.</div>';
      list.forEach(function (m) {
        var d = document.createElement("div"); d.className = "map-card";
        d.innerHTML = '<div class="info"><div class="t">' + esc(m.title) + '</div><div class="s">' + m.nodes + ' элементов</div></div><div class="more">⋯</div>';
        d.querySelector(".info").onclick = function () { openMap(m.id); };
        d.querySelector(".more").onclick = function (e) {
          e.stopPropagation();
          openSheet(m.title, [
            { label: "Открыть", fn: function () { openMap(m.id); } },
            { label: "Переименовать", fn: function () { openInput("Название карты", m.title, false, function (v) { if (v) post("/api/maps/rename", { id: m.id, title: v }).then(showMaps); }); } },
            { label: "Удалить карту", danger: true, fn: function () { post("/api/maps/delete", { id: m.id }).then(showMaps); } }
          ]);
        };
        box.appendChild(d);
      });
    });
  }
  document.getElementById("new-map").onclick = function () { openInput("Новая карта (название проекта)", "", false, function (v) { if (v) post("/api/maps/create", { title: v }).then(function (r) { openMap(r.id); }); }); };

  // ---- graph view ----
  var svg = document.getElementById("graph"), gview = document.getElementById("gview");
  var view = { tx: 0, ty: 0, s: 1 }, currentMap = null, lastMapId = null;
  function applyView() { gview.setAttribute("transform", "translate(" + view.tx + "," + view.ty + ") scale(" + view.s + ")"); }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  var graphRoot = { x: 0, y: 0 };
  function openMap(id) {
    api("/api/map?id=" + id).then(function (m) {
      currentMap = m;
      document.getElementById("maps-screen").style.display = "none";
      document.getElementById("map-screen").style.display = "block";
      document.getElementById("map-name").textContent = m.title;
      renderGraph(m);
      if (lastMapId !== id) { view = { tx: window.innerWidth / 2, ty: window.innerHeight / 2, s: 1 }; lastMapId = id; }
      applyView();
    });
  }
  document.getElementById("map-back").onclick = showMaps;
  document.getElementById("add-block").onclick = function () { addNode(null, 1); };

  function renderGraph(m) {
    var byParent = {};
    m.nodes.forEach(function (n) { var k = n.parent_id || "root"; (byParent[k] = byParent[k] || []).push(n); });
    // 4 стороны (право/лево/верх/низ): блоки распределяются по сторонам по очереди,
    // каждая ветка растёт наружу в свою сторону, братья — поперёк
    var COL = 165, ROW = 58, R0 = 200, pos = {}, col = {}, dep = {};
    var tops = byParent["root"] || [];
    var sides = [{ d: [1, 0], p: [0, 1] }, { d: [-1, 0], p: [0, -1] }, { d: [0, -1], p: [1, 0] }, { d: [0, 1], p: [-1, 0] }];
    var buckets = [[], [], [], []], sideIdx = { right: 0, left: 1, up: 2, down: 3 }, deferred = [];
    tops.forEach(function (t, i) {
      var item = { node: t, color: PALETTE[i % PALETTE.length] };
      if (t.side && sideIdx[t.side] !== undefined) buckets[sideIdx[t.side]].push(item); else deferred.push(item);
    });
    // по умолчанию блоки идут вправо; сторону можно поменять вручную
    deferred.forEach(function (it) { buckets[0].push(it); });
    buckets.forEach(function (items, si) {
      if (!items.length) return;
      var dir = { x: sides[si].d[0], y: sides[si].d[1] }, perp = { x: sides[si].p[0], y: sides[si].p[1] };
      var local = {}, vc = { v: 0 };
      function layoutLocal(node, depth, color) {
        dep[node.id] = depth; col[node.id] = color;
        var ch = byParent[node.id] || [], u = R0 + (depth - 1) * COL, v;
        if (!ch.length) { v = vc.v; vc.v += ROW; }
        else { ch.forEach(function (c) { layoutLocal(c, depth + 1, color); }); v = (local[ch[0].id].v + local[ch[ch.length - 1].id].v) / 2; }
        local[node.id] = { u: u, v: v };
      }
      items.forEach(function (it) { layoutLocal(it.node, 1, it.color); vc.v += ROW; });
      var vs = []; for (var k in local) vs.push(local[k].v);
      var vmid = (Math.min.apply(null, vs) + Math.max.apply(null, vs)) / 2;
      for (var id in local) { var o = local[id], vv = o.v - vmid; pos[id] = { x: o.u * dir.x + vv * perp.x, y: o.u * dir.y + vv * perp.y }; }
    });
    graphRoot = { x: 0, y: 0 };

    gview.innerHTML = "";
    // рёбра — плавные кривые, цвет ветки
    m.nodes.forEach(function (n) {
      var p = n.parent_id ? pos[n.parent_id] : graphRoot, c = pos[n.id];
      var dx = c.x - p.x, dy = c.y - p.y, len = Math.hypot(dx, dy) || 1, off = len * 0.08;
      var mxp = (p.x + c.x) / 2 + (-dy / len) * off, myp = (p.y + c.y) / 2 + (dx / len) * off;
      var path = document.createElementNS(SVGNS, "path");
      path.setAttribute("d", "M" + p.x + "," + p.y + " Q" + mxp + "," + myp + " " + c.x + "," + c.y);
      path.setAttribute("fill", "none"); path.setAttribute("stroke", col[n.id]); path.setAttribute("stroke-width", "2.5"); path.setAttribute("stroke-opacity", "0.6");
      gview.appendChild(path);
    });
    // центр (проект)
    addRectNode(graphRoot.x, graphRoot.y, 0, "#ffffff", "#0f1115", m.title, function () {
      openSheet(m.title, [
        { label: "➕ Добавить блок", fn: function () { addNode(null, 1); } },
        { label: "✏️ Переименовать проект", fn: function () { openInput("Название проекта", m.title, false, function (v) { if (v) post("/api/maps/rename", { id: m.id, title: v }).then(function () { openMap(m.id); }); }); } },
        { label: "🗑 Удалить карту", danger: true, fn: function () { post("/api/maps/delete", { id: m.id }).then(showMaps); } }
      ]);
    }, true);
    // узлы — прямоугольники, цвет ветки
    m.nodes.forEach(function (n) {
      addRectNode(pos[n.id].x, pos[n.id].y, dep[n.id], col[n.id], "#ffffff", n.title + (n.note ? "  📝" : ""), function () { nodeSheet(n, dep[n.id]); }, false);
    });
  }

  function wrapLabel(label, cpl, maxLines) {
    var words = label.split(/\s+/), lines = [], cur = "";
    words.forEach(function (word) {
      while (word.length > cpl) { if (cur) { lines.push(cur); cur = ""; } lines.push(word.slice(0, cpl - 1) + "…"); word = ""; }
      if (!word) return;
      var t = cur ? cur + " " + word : word;
      if (t.length <= cpl) cur = t; else { if (cur) lines.push(cur); cur = word; }
    });
    if (cur) lines.push(cur);
    if (lines.length > maxLines) { lines = lines.slice(0, maxLines); var last = lines[maxLines - 1]; lines[maxLines - 1] = last.replace(/…?$/, "").slice(0, cpl - 1) + "…"; }
    return lines.length ? lines : [""];
  }
  function addRectNode(x, y, depth, fill, textFill, label, onTap, isCenter) {
    var sz = isCenter ? { h: 56, fs: 17, max: 200 }
      : depth === 1 ? { h: 42, fs: 13.5, max: 170 }
      : depth === 2 ? { h: 36, fs: 12.5, max: 158 }
      : { h: 30, fs: 11.5, max: 148 };
    var charW = sz.fs * 0.58, padX = 22, padY = 14;
    var cpl = Math.max(8, Math.floor((sz.max - padX) / charW));
    var lines = wrapLabel(label, cpl, 3);
    var longest = lines.reduce(function (a, l) { return Math.max(a, l.length); }, 0);
    var w = Math.max(66, Math.min(sz.max, longest * charW + padX));
    var lineH = sz.fs * 1.18;
    var h = Math.max(sz.h, lines.length * lineH + padY);
    var g = document.createElementNS(SVGNS, "g"); g.setAttribute("class", "gnode"); g.setAttribute("transform", "translate(" + x + "," + y + ")");
    var hit = document.createElementNS(SVGNS, "rect");  // увеличенная прозрачная зона нажатия
    hit.setAttribute("x", -w / 2 - 10); hit.setAttribute("y", -h / 2 - 10); hit.setAttribute("width", w + 20); hit.setAttribute("height", h + 20);
    hit.setAttribute("fill", "transparent");
    g.appendChild(hit);
    var r = document.createElementNS(SVGNS, "rect");
    r.setAttribute("x", -w / 2); r.setAttribute("y", -h / 2); r.setAttribute("width", w); r.setAttribute("height", h);
    r.setAttribute("rx", 14); r.setAttribute("fill", fill); r.setAttribute("stroke", "#0f1115"); r.setAttribute("stroke-width", isCenter ? 4 : 2);
    g.appendChild(r);
    var t = document.createElementNS(SVGNS, "text");
    t.setAttribute("text-anchor", "middle"); t.setAttribute("fill", textFill);
    t.setAttribute("font-size", sz.fs); t.setAttribute("font-weight", isCenter ? "800" : "700");
    var y0 = -((lines.length - 1) / 2) * lineH;
    lines.forEach(function (ln, i) {
      var ts = document.createElementNS(SVGNS, "tspan");
      ts.setAttribute("x", 0); ts.setAttribute("y", y0 + i * lineH); ts.setAttribute("dominant-baseline", "central");
      ts.textContent = ln; t.appendChild(ts);
    });
    g.appendChild(t);
    g.__tap = onTap;
    g.addEventListener("click", function () { if (!gMoved) onTap(); });  // десктоп
    gview.appendChild(g);
  }

  function lvl(d) { return d <= 1 ? "блок" : d === 2 ? "подблок" : d === 3 ? "задачу" : "подзадачу"; }
  function addNode(parentId, childDepth) {
    openInput("Добавить " + lvl(childDepth), "", false, function (v) {
      if (v) post("/api/map/node/add", { map_id: currentMap.id, parent_id: parentId, title: v }).then(function () { openMap(currentMap.id); });
    });
  }
  function setSide(id, side) { post("/api/map/node/update", { id: id, side: side }).then(function () { openMap(currentMap.id); }); }
  function sideSheet(n) {
    openSheet("Сторона: " + n.title, [
      { label: "➡️ Вправо" + (n.side === "right" ? " ✓" : ""), fn: function () { setSide(n.id, "right"); } },
      { label: "⬅️ Влево" + (n.side === "left" ? " ✓" : ""), fn: function () { setSide(n.id, "left"); } },
      { label: "⬆️ Вверх" + (n.side === "up" ? " ✓" : ""), fn: function () { setSide(n.id, "up"); } },
      { label: "⬇️ Вниз" + (n.side === "down" ? " ✓" : ""), fn: function () { setSide(n.id, "down"); } },
      { label: "♻️ Авто" + (!n.side ? " ✓" : ""), fn: function () { setSide(n.id, ""); } }
    ]);
  }
  function nodeSheet(n, depth) {
    var actions = [
      { label: "➕ Добавить " + lvl(depth + 1), fn: function () { addNode(n.id, depth + 1); } },
      { label: "✏️ Переименовать", fn: function () { openInput("Название", n.title, false, function (v) { if (v) post("/api/map/node/update", { id: n.id, title: v }).then(function () { openMap(currentMap.id); }); }); } },
      { label: "📝 Заметка" + (n.note ? " ✓" : ""), fn: function () { openInput("Заметка", n.note || "", true, function (v) { post("/api/map/node/update", { id: n.id, note: v }).then(function () { openMap(currentMap.id); }); }); } }
    ];
    if (depth === 1) actions.push({ label: "📍 Сторона", fn: function () { sideSheet(n); } });
    actions.push({ label: "🗑 Удалить", danger: true, fn: function () { post("/api/map/node/delete", { id: n.id }).then(function () { openMap(currentMap.id); }); } });
    openSheet(n.title, actions);
  }

  // ---- pan & zoom ----
  var gMoved = false, dragging = false, sX, sY, sTx, sTy, pinch = null;
  function tDist(t) { var dx = t[0].clientX - t[1].clientX, dy = t[0].clientY - t[1].clientY; return Math.hypot(dx, dy); }
  function tMid(t) { return { x: (t[0].clientX + t[1].clientX) / 2, y: (t[0].clientY + t[1].clientY) / 2 }; }
  svg.addEventListener("touchstart", function (e) {
    if (e.touches.length === 1) { dragging = true; gMoved = false; sX = e.touches[0].clientX; sY = e.touches[0].clientY; sTx = view.tx; sTy = view.ty; }
    else if (e.touches.length === 2) { dragging = false; pinch = { d: tDist(e.touches), s: view.s, tx: view.tx, ty: view.ty }; var mm = tMid(e.touches); pinch.mx = mm.x; pinch.my = mm.y; }
  }, { passive: false });
  svg.addEventListener("touchmove", function (e) {
    e.preventDefault();
    if (e.touches.length === 1 && dragging) {
      var dx = e.touches[0].clientX - sX, dy = e.touches[0].clientY - sY;
      if (Math.abs(dx) + Math.abs(dy) > 14) gMoved = true;
      view.tx = sTx + dx; view.ty = sTy + dy; applyView();
    } else if (e.touches.length === 2 && pinch) {
      gMoved = true; var ns = clamp(pinch.s * (tDist(e.touches) / pinch.d), 0.25, 3.5);
      view.tx = pinch.mx - ((pinch.mx - pinch.tx) / pinch.s) * ns;
      view.ty = pinch.my - ((pinch.my - pinch.ty) / pinch.s) * ns; view.s = ns; applyView();
    }
  }, { passive: false });
  svg.addEventListener("touchend", function (e) {
    if (!gMoved && e.changedTouches.length === 1) {
      var t = e.changedTouches[0], el = document.elementFromPoint(t.clientX, t.clientY);
      while (el && el !== svg) { if (el.__tap) { e.preventDefault(); el.__tap(); break; } el = el.parentNode; }
    }
